<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>🐍🍕 Better Snake AI</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

#menu{
text-align:center;
z-index:2;
}

h1{
font-size:56px;
animation:float 2s infinite;
text-shadow:0 0 25px lime;
}

label{
display:block;
margin:8px;
font-size:22px;
}

button{
padding:14px 34px;
font-size:22px;
cursor:pointer;
}

canvas{
display:none;
background:black;
border:4px solid lime;
}

.pizza{
position:absolute;
font-size:40px;
animation:fall linear infinite;
pointer-events:none;
}

#board{
border:2px solid lime;
padding:10px;
min-height:90px;
margin-top:10px;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

@keyframes fall{

0%{
top:-120px;
transform:rotate(0);
}

100%{
top:110vh;
transform:rotate(720deg);
}

}
</style>

</head>

<body>

<div id="menu">

<h1>🐍🍕 Better Snake</h1>

<label><input id="portal" type="checkbox"> Portal</label>

<label><input id="fast" type="checkbox"> Fast</label>

<label><input id="dont" type="checkbox"> DON'T 🚀</label>

<label><input id="rainbow" type="checkbox"> Rainbow</label>

<label><input id="grid" type="checkbox"> Grid</label>

<label><input id="ai" type="checkbox"> Better AI 🧠</label>

<label>

Pizza 🍕

<select id="food">

<option>1</option>
<option>3</option>
<option>5</option>
<option>10</option>
<option>30</option>
<option>50</option>
<option>100</option>
<option>200</option>

</select>

</label>

<button id="start">
START
</button>

<h2>🏆 Leaderboard</h2>

<div id="board"></div>

</div>

<canvas id="game"></canvas>

<script>

for(let i=0;i<20;i++){

let p=document.createElement("div");

p.className="pizza";

p.innerHTML="🍕";

p.style.left=
Math.random()*100+"vw";

p.style.top="-120px";

p.style.animationDuration=
(3+Math.random()*5)+"s";

document.body.appendChild(p);

}

const c=
document.getElementById(
"game"
);

const ctx=
c.getContext(
"2d"
);

c.width=600;

c.height=600;

const S=20;

let snake=[];

let foods=[];

let dx=20;

let dy=0;

let score=0;

let loop;

let set={};

function foodPos(){

while(true){

let x=
Math.floor(
Math.random()*30
)*20;

let y=
Math.floor(
Math.random()*30
)*20;

if(

!snake.some(
a=>
a.x===x
&&
a.y===y
)

){

return{
x,
y
};

}

}

}

function makeFoods(){

foods=[];

for(
let i=0;
i<
Number(
food.value
);
i++
){

foods.push(
foodPos()
);

}

}

function startGame(){

set={

portal:
portal.checked,

rainbow:
rainbow.checked,

grid:
grid.checked,

ai:
ai.checked

};

snake=[

{
x:300,
y:300
}

];

foods=[];

dx=20;

dy=0;

score=0;

makeFoods();

menu.style.display=
"none";

c.style.display=
"block";

let speed=120;

if(
fast.checked
)
speed=70;

if(
dont.checked
)
speed=35;

clearInterval(
loop
);

loop=
setInterval(
update,
speed
);

}

function aiMove(){

let head=
snake[0];

let target=
foods[0];

if(!target)
return;

let dirs=[

[20,0],
[-20,0],
[0,20],
[0,-20]

];

let best;

let bestDist=
999999;

for(
let d of dirs
){

let nx=
head.x+d[0];

let ny=
head.y+d[1];

if(
set.portal
){

if(nx<0)
nx=580;

if(nx>580)
nx=0;

if(ny<0)
ny=580;

if(ny>580)
ny=0;

}

else{

if(
nx<0||
ny<0||
nx>580||
ny>580
)
continue;

}

if(

snake.some(
s=>
s.x===nx
&&
s.y===ny
)

)

continue;

let dist=

Math.abs(
target.x-nx
)

+

Math.abs(
target.y-ny
);

if(
dist<
bestDist
){

bestDist=
dist;

best=d;

}

}

if(best){

dx=
best[0];

dy=
best[1];

}

}

function update(){

if(
set.ai
)
aiMove();

let h={

x:
snake[0].x+dx,

y:
snake[0].y+dy

};

if(
set.portal
){

if(h.x<0)
h.x=580;

if(h.x>580)
h.x=0;

if(h.y<0)
h.y=580;

if(h.y>580)
h.y=0;

}

else{

if(
h.x<0||
h.y<0||
h.x>580||
h.y>580
){

over();

return;

}

}

if(

snake.some(
s=>
s.x===h.x
&&
s.y===h.y
)

){

over();

return;

}

snake.unshift(
h
);

let eat=false;

foods.forEach(

(f,i)=>{

if(
f.x===h.x
&&
f.y===h.y
){

foods[i]=
foodPos();

score++;

eat=true;

}

}

);

if(
!eat
)
snake.pop();

draw();

}

function draw(){

ctx.fillStyle=
"black";

ctx.fillRect(
0,
0,
600,
600
);

ctx.font=
"18px Arial";

foods.forEach(

f=>{

ctx.fillText(
"🍕",
f.x,
f.y+18
);

}

);

snake.forEach(

(s,i)=>{

ctx.fillStyle=

i===0

?

"yellow"

:

set.rainbow

?

`hsl(${i*15},100%,50%)`

:

"lime";

ctx.fillRect(
s.x,
s.y,
20,
20
);

}

);

ctx.fillStyle=
"white";

ctx.font=
"26px Arial";

ctx.fillText(
"🍕 "+score,
10,
30
);

}

function over(){

clearInterval(
loop);

alert(
"Score "+score
);

location.reload();

}

document.addEventListener(

"keydown",

e=>{

if(
set.ai
)
return;

if(
e.key==="ArrowUp"
&&dy===0){
dx=0;
dy=-20;
}

if(
e.key==="ArrowDown"
&&dy===0){
dx=0;
dy=20;
}

if(
e.key==="ArrowLeft"
&&dx===0){
dx=-20;
dy=0;
}

if(
e.key==="ArrowRight"
&&dx===0){
dx=20;
dy=0;
}

}

);

start.onclick=
startGame;

</script>

</body>
</html>
